version: '3.8'

services:
  cmms-db:
    image: postgres:16-alpine
    container_name: cmms-postgres
    environment:
      POSTGRES_DB: cmms
      POSTGRES_USER: cmms_user
      POSTGRES_PASSWORD: cmms_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  cmms-nginx:
    image: nginx:1.25-alpine
    container_name: cmms-nginx
    ports:
      - "8082:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux에서 호스트 머신 IP로의 해석 지원
    depends_on:
      - cmms-db
    restart: always

volumes:
  pgdata:
    driver: local
