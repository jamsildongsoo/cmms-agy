# 운영 배포 (B안: 레지스트리 pull). 이미지는 CI에서 빌드/푸시하고, 서버는 pull만 한다.
#   배포: docker compose -f docker-compose.prod.yml pull \
#         && docker compose -f docker-compose.prod.yml up -d
#   필요한 .env 키: IMAGE_REGISTRY, IMAGE_TAG(선택), DB_*, JWT_SECRET (+ 첨부 쓰면 STORAGE_*)
#   DB·Object Storage는 외부(Supabase). .env는 env_file로 주입 — 이미지엔 굽지 않는다.
#   (소스에서 직접 빌드하려면 docker-compose.prod.build.yml 같은 별도 파일로 분리 권장)
services:
  api:
    image: "${IMAGE_REGISTRY:?IMAGE_REGISTRY must be set, e.g. ghcr.io/your-org}/cmms-api:${IMAGE_TAG:-latest}"
    container_name: cmms-api
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    expose:
      - "8080"          # 외부 노출 없이 web(nginx)만 접근
    healthcheck:
      # actuator 미사용 → 8080 TCP listen 여부로 기동 완료 판정 (temurin 이미지는 bash 제공)
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 3s
      retries: 12        # 최대 ~120s (콜드 스타트 + Flyway 마이그레이션 여유)
      start_period: 40s
    restart: unless-stopped

  web:
    image: "${IMAGE_REGISTRY:?IMAGE_REGISTRY must be set, e.g. ghcr.io/your-org}/cmms-web:${IMAGE_TAG:-latest}"
    container_name: cmms-web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy   # 백엔드가 실제 기동(8080)된 뒤 web 시작 → 초기 502 방지
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
