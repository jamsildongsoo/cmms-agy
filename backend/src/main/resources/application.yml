server:
  port: 8080

spring:
  application:
    name: cmms-backend

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

  # 모든 환경(로컬/운영) 공통 — 자격증명은 환경변수로만 주입. 미설정 시 기동 실패(fail-fast).
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5} # Supabase 세션 풀러 커넥션 고갈 방지
      minimum-idle: ${DB_POOL_MIN:2}

  jpa:
    hibernate:
      ddl-auto: none # Flyway 버전 관리를 위해 DDL 자동 업데이트 비활성화
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true # 기존 DB가 존재할 경우 V1부터 마이그레이션 적용을 위한 설정
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}                  # 기본값 없음 — 반드시 환경변수로 주입(fail-fast)
  expiration: ${JWT_EXPIRATION:1800000}  # 30분 (밀리초)

# ⚠️ [미구현] Object Storage (Supabase S3 호환)
# 현재 이 설정을 바인딩하는 빈/의존성이 없는 비활성 상태입니다.
# 구현 시 필요: build.gradle.kts에 AWS S3 SDK 추가 + 업로드/다운로드 코드 작성.
# (file_attachment / file_attachment_item 테이블은 V1 스키마에 이미 정의됨)
cloud:
  aws:
    credentials:
      access-key: ${STORAGE_ACCESS_KEY}
      secret-key: ${STORAGE_SECRET_KEY}
    s3:
      bucket: ${STORAGE_BUCKET:cmms-attachments}
    region:
      static: ${STORAGE_REGION:ap-southeast-1} # 싱가포르 리전 기준
      auto: false
    stack:
      auto: false
    endpoint: ${STORAGE_ENDPOINT}
    allowed-mimes: ${STORAGE_ALLOWED_MIMES:image/*,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.ms-powerpoint,application/x-hwp,application/vnd.hancom.hwp,application/hwp+zip,application/vnd.hancom.hwpx,application/zip,application/x-zip-compressed}
    # 고아 객체 정리(reconciliation) — 기본 비활성. 메타(file_attachment_item) 없는 S3 객체를 유예시간 경과 후 제거.
    reconcile-enabled: ${STORAGE_RECONCILE_ENABLED:false}
    reconcile-cron: ${STORAGE_RECONCILE_CRON:0 0 4 * * *}   # 매일 04:00
    reconcile-grace-hours: ${STORAGE_RECONCILE_GRACE_HOURS:24}
