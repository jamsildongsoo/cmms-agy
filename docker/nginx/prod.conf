# TLS는 앞단(LB/Cloudflare)에서 종단 → 원본 스킴은 X-Forwarded-Proto로 전달됨.
# LB 헤더가 있으면 그대로, 없으면(직접 접근) 현재 스킴으로 폴백.
map $http_x_forwarded_proto $client_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;   # TLS 종단은 앞단 LB. 이 컨테이너는 평문 HTTP만 수신.
    server_name _;

    # 업로드 한도 — Spring multipart 한도와 일치시킬 것
    client_max_body_size 100M;

    # 빌드된 React 정적 자산 서빙
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA 라우팅 fallback
    }

    # API 프록시 — 같은 compose 네트워크의 api 서비스
    location /api {
        # Docker 내장 DNS로 'api'를 매 요청 재해석(변수 proxy_pass).
        # api 컨테이너 재시작으로 IP가 바뀌어도 stale-IP 502 없이 따라감.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_proto;
    }
}
